<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	  xmlns:n="http://typo3.org/ns/GeorgRinger/News/ViewHelpers"
	  data-namespace-typo3-fluid="true">

<f:if condition="{configuration.insertAbove}">
	<f:render section="paginator" arguments="{pagination: pagination,configuration:configuration}" />
</f:if>

<f:renderChildren arguments="{contentArguments}" />

<f:if condition="{configuration.insertBelow}">
	<f:render section="paginator" arguments="{pagination: pagination,configuration:configuration}" />
</f:if>

<f:section name="paginator">
	<f:if condition="{pagination.numberOfPages} > 1">
		<f:if condition="{settings.list.paginate.prevNextHeaderTags}">
			<f:if condition="{pagination.previousPage}">
				<f:if condition="{pagination.previousPage} > 1">
					<f:then>
						<n:headerData><link rel="prev" href="{n:widget.uri(useCacheHash:1,arguments:{currentPage:pagination.previousPage},addQueryStringMethod:'{configuration.addQueryStringMethod}') -> f:format.htmlentities()}" /></n:headerData>
					</f:then>
					<f:else>
						<n:headerData><link rel="prev" href="{n:widget.uri(useCacheHash:1,addQueryStringMethod:'{configuration.addQueryStringMethod}') -> f:format.htmlentities()}" /></n:headerData>
					</f:else>
				</f:if>
			</f:if>
			<f:if condition="{pagination.nextPage}">
				<n:headerData><link rel="next" href="{n:widget.uri(useCacheHash:1,arguments:{currentPage:pagination.nextPage},addQueryStringMethod:'{configuration.addQueryStringMethod}') -> f:format.htmlentities()}" /></n:headerData>
			</f:if>
		</f:if>

		<div class="page-navigation">
			<p>
				<f:translate key="paginate_overall" arguments="{0:pagination.current, 1:pagination.numberOfPages}" />
			</p>
			<ul class="f3-widget-paginator">
				<f:if condition="{pagination.previousPage}">
					<li class="previous">
						<f:if condition="{pagination.previousPage} > 1">
							<f:then>
								<n:widget.link useCacheHash="1" addQueryStringMethod="{configuration.addQueryStringMethod}" arguments="{currentPage: pagination.previousPage}">
									<f:translate key="paginate_previous" />
								</n:widget.link>
							</f:then>
							<f:else>
								<n:widget.link useCacheHash="1" addQueryStringMethod="{configuration.addQueryStringMethod}">
									<f:translate key="paginate_previous" />
								</n:widget.link>
							</f:else>
						</f:if>
					</li>
				</f:if>
				<f:if condition="{pagination.displayRangeStart} > 1">
					<li class="first">
						<n:widget.link useCacheHash="1" addQueryStringMethod="{f:if(condition:queryParams.overwriteDemand, then:'{configuration.addQueryStringMethod}', else: '')}">1</n:widget.link>
					</li>
				</f:if>
				<f:if condition="{pagination.hasLessPages}">
					<li>…</li>
				</f:if>
				<f:for each="{pagination.pages}" as="page">
					<f:if condition="{page.isCurrent}">
						<f:then>
							<li class="current">{page.number}</li>
						</f:then>
						<f:else>
							<li>
								<f:if condition="{page.number} > 1">
									<f:then>
										<n:widget.link useCacheHash="1" addQueryStringMethod="{configuration.addQueryStringMethod}" arguments="{currentPage: page.number}">{page.number}</n:widget.link>
									</f:then>
									<f:else>
										<n:widget.link addQueryStringMethod="{configuration.addQueryStringMethod}">{page.number}</n:widget.link>
									</f:else>
								</f:if>
							</li>
						</f:else>
					</f:if>
				</f:for>
				<f:if condition="{pagination.hasMorePages}">
					<li>…</li>
				</f:if>
				<f:if condition="{pagination.displayRangeEnd} < {pagination.numberOfPages}">
					<li class="last">
						<n:widget.link useCacheHash="1" addQueryStringMethod="{configuration.addQueryStringMethod}" arguments="{currentPage: pagination.numberOfPages}">{pagination.numberOfPages}</n:widget.link>
					</li>
				</f:if>
				<f:if condition="{pagination.nextPage}">
					<li class="last next">
						<n:widget.link useCacheHash="1" addQueryStringMethod="{configuration.addQueryStringMethod}" arguments="{currentPage: pagination.nextPage}">
							<f:translate key="paginate_next" />
						</n:widget.link>
					</li>
				</f:if>
			</ul>
		</div>
		<div class="news-clear"></div>
	</f:if>
</f:section>
</html>
